<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>家庭维修报价工作台</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="brand">
      <span class="logo">🔧</span>
      <h1>家庭维修报价工作台</h1>
    </div>
    <div class="role-switcher">
      <label>当前角色：</label>
      <select id="roleSelect">
        <option value="service">客服（王小美）</option>
        <option value="tech">师傅（李师傅）</option>
        <option value="tech2">师傅（张师傅）</option>
        <option value="client">客户（陈女士）</option>
        <option value="client2">客户（刘先生）</option>
        <option value="reviewer">财务复核（赵会计）</option>
      </select>
      <label class="user-label" id="currentUserLabel"></label>
    </div>
  </header>

  <div class="container-layout">
    <aside class="sidebar">
      <nav class="nav-menu">
        <div class="nav-group-title">功能导航</div>
        <ul id="navList"></ul>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-secondary" id="resetDataBtn">🔄 重置演示数据</button>
      </div>
    </aside>

    <main class="main-content">
      <div id="contentArea"></div>
    </main>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/components.js"></script>
<script src="js/service_panel.js"></script>
<script src="js/tech_panel.js"></script>
<script src="js/client_panel.js"></script>
<script src="js/reviewer_panel.js"></script>
<script src="js/timeline.js"></script>
<script src="js/app.js"></script>
</body>
</html>
